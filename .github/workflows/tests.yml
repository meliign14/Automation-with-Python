name: Run Selenium Tests
on: [push, pull_request] # Se activa al subir código o crear PR

jobs:
  test:
    runs-on: ubuntu-latest # Usa una máquina Linux de GitHub

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar tests con Pytest
        run: pytest --html=report.html # Genera un reporte HTML

      - name: Guardar reporte como artefacto
        if: always() # Se ejecuta aunque fallen los tests
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pytest
          path: report.html # Sube el archivo para que lo descargues
